<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a0d33"/>
    </linearGradient>
    <!-- Clip content to the icon background area.
         rx=155 in pre-scale coords → 155×0.8359 ≈ 130px after scaling,
         matching macOS system icon corner radius on the ~428px opaque region. -->
    <clipPath id="innerClip">
      <rect x="0" y="0" width="512" height="512" rx="155"/>
    </clipPath>
  </defs>

  <!-- macOS app icons carry ~42px transparent padding on all sides (opaque
       region ≈428×428 on a 512×512 canvas). The icon shape is defined by the
       PNG alpha channel — macOS does not auto-apply a squircle mask on desktop.
       Scale the 512×512 content to 428×428 and center it. -->
  <g transform="translate(42, 42) scale(0.8359375)">

    <!-- Background: dark gradient, rx=155 (≈130px after scaling, matches system icons) -->
    <rect width="512" height="512" rx="155" fill="url(#bg)"/>

    <g clip-path="url(#innerClip)">

      <!-- Header band -->
      <rect x="0" y="0" width="512" height="88" fill="#5b21b6" opacity="0.72"/>
      <!-- Title -->
      <rect x="90" y="42" width="240" height="16" rx="8" fill="white" opacity="0.90"/>

      <!-- Intro text (two lines) -->
      <rect x="44" y="152" width="424" height="12" rx="6" fill="white" opacity="0.90"/>
      <rect x="44" y="180" width="328" height="12" rx="6" fill="white" opacity="0.90"/>

      <!-- Bullet points -->
      <circle cx="52" cy="244" r="8" fill="white" opacity="0.90"/>
      <rect x="70" y="237" width="138" height="14" rx="7" fill="white" opacity="0.90"/>
      <rect x="86" y="267" width="110" height="10" rx="5" fill="white" opacity="0.90"/>

      <circle cx="52" cy="300" r="8" fill="white" opacity="0.90"/>
      <rect x="70" y="293" width="160" height="14" rx="7" fill="white" opacity="0.90"/>
      <rect x="86" y="323" width="88" height="10" rx="5" fill="white" opacity="0.90"/>

      <circle cx="52" cy="356" r="8" fill="white" opacity="0.90"/>
      <rect x="70" y="349" width="120" height="14" rx="7" fill="white" opacity="0.90"/>
      <rect x="86" y="379" width="100" height="10" rx="5" fill="white" opacity="0.90"/>

      <!-- Bar chart -->
      <line x1="244" y1="288" x2="468" y2="288" stroke="white" stroke-width="2" stroke-dasharray="6 5" opacity="0.18"/>
      <line x1="244" y1="338" x2="468" y2="338" stroke="white" stroke-width="2" stroke-dasharray="6 5" opacity="0.18"/>
      <line x1="244" y1="389" x2="468" y2="389" stroke="white" stroke-width="2.5" opacity="0.32"/>
      <rect x="260" y="299" width="36" height="90" rx="5" fill="#f87171" opacity="0.88"/>
      <rect x="308" y="237" width="36" height="152" rx="5" fill="#34d399" opacity="0.88"/>
      <rect x="356" y="351" width="36" height="38" rx="5" fill="#8b5cf6" opacity="0.92"/>
      <rect x="404" y="265" width="36" height="124" rx="5" fill="#fbbf24" opacity="0.88"/>

      <!-- Step indicator dots -->
      <circle cx="196" cy="466" r="10" fill="white" fill-opacity="0.55"/>
      <circle cx="232" cy="466" r="10" fill="white" fill-opacity="0.55"/>
      <circle cx="268" cy="466" r="14" fill="#8b5cf6"/>
      <circle cx="304" cy="466" r="10" fill="white" fill-opacity="0.55"/>
      <circle cx="340" cy="466" r="10" fill="white" fill-opacity="0.55"/>

    </g>
  </g>

  <!-- macOS-style border: thin silver stroke following the icon's squircle edge,
       sitting in the transparent padding. Matches the opaque region dimensions
       (428×428 at 42,42, rx=130) so it hugs the icon shape. -->
  <rect x="42" y="42" width="428" height="428" rx="130" fill="none"
        stroke="#c0c0c0" stroke-width="1.5" opacity="0.45"/>
</svg>
